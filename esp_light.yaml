    id: lampa2
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
  - platform: monochromatic
    name: "Lampa 3"
    output: out_lampa3
    id: lampa3
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
  - platform: monochromatic
    name: "Lampa 4"
    output: out_lampa4
    id: lampa4
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
  - platform: monochromatic
    name: "Lampa 5"
    output: out_lampa5
    id: lampa5
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
  - platform: monochromatic
    name: "Lampa 6"
    output: out_lampa6
    id: lampa6
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
  - platform: monochromatic
    name: "Lampa 7"
    output: out_lampa7
