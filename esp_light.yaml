esphome:
  name: esp-light
  project:
    name: "mackuz.esp-light"
    version: "1.0"

  on_boot:
    priority: 600
    then:
      # Natychmiastowe upewnienie się, że lampy są ciemne
      - light.turn_off: { id: lampa1, transition_length: 0s }
      - light.turn_off: { id: lampa2, transition_length: 0s }
      - light.turn_off: { id: lampa3, transition_length: 0s }
      - light.turn_off: { id: lampa4, transition_length: 0s }
      - light.turn_off: { id: lampa5, transition_length: 0s }
      - light.turn_off: { id: lampa6, transition_length: 0s }
      - light.turn_off: { id: lampa7, transition_length: 0s }      
      
      - delay: 4s 
      - lambda: |-
          // 1. Synchronizacja i Fix RTC
          uint8_t status = 0;
          id(ds_time).read_byte(0x0F, &status);
          id(ds_time).write_byte(0x0E, 0x00);
          id(ds_time).write_byte(0x0F, 0x00);
          id(ds_time).update();

          auto now = id(ds_time).now();
          if (!now.is_valid()) {
            ESP_LOGE("BOOT", "Czas nieprawidłowy!");
            return;
          }

          int cur_min = now.hour * 60 + now.minute;
          int m_up_e = (int)id(h_end_sunrise).state * 60 + (int)id(m_end_sunrise).state;
          int m_dn_s = (int)id(h_start_sunset).state * 60 + (int)id(m_start_sunset).state;
          float soft_ms = 120000.0f; // 2 minuty

          // Funkcja pomocnicza do bezpiecznego rozpalania
          auto soft_start_light = [&](light::LightState* l, float target, bool auto_st) {
            if (auto_st) {
              auto call = l->make_call();
              call.set_state(true); // <--- Wymusza status ON w interfejsie
              call.set_brightness(target);
              call.set_transition_length(soft_ms);
              call.perform();
            }
          };

          // Rozpalanie L1-L6 jeśli prąd wrócił w dzień
          if (cur_min >= m_up_e && cur_min < m_dn_s) {
              ESP_LOGW("SOFT_START", "Dzień! Rozpalam L1-L6...");
              soft_start_light(id(lampa1), id(pwr_l1).state/100.0f, id(auto_l1).state);
              soft_start_light(id(lampa2), id(pwr_l2).state/100.0f, id(auto_l2).state);
              soft_start_light(id(lampa3), id(pwr_l3).state/100.0f, id(auto_l3).state);
              soft_start_light(id(lampa4), id(pwr_l4).state/100.0f, id(auto_l4).state);
              soft_start_light(id(lampa5), id(pwr_l5).state/100.0f, id(auto_l5).state);
              soft_start_light(id(lampa6), id(pwr_l6).state/100.0f, id(auto_l6).state);
          }

          // Rozpalanie L7 (ma inne godziny)
          int l7_up_e = (int)id(l7_h_end_sunrise).state * 60 + (int)id(l7_m_end_sunrise).state;
          int l7_dn_s = (int)id(l7_h_start_sunset).state * 60 + (int)id(l7_m_start_sunset).state;
          if (cur_min >= l7_up_e && cur_min < l7_dn_s) {
              ESP_LOGW("SOFT_START", "Dzień! Rozpalam L7...");
              soft_start_light(id(lampa7), id(pwr_l7).state/100.0f, id(auto_l7).state);
          }



esp32:
  board: esp32dev
  framework: { type: arduino }

preferences:
  flash_write_interval: 10s

logger:
  level: INFO
  logs:
    text_sensor: ERROR

api:
  encryption: { key: !secret api_encryption_key }
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.1.93
  power_save_mode: NONE

web_server:
  port: 80

i2c:
  sda: 21
  scl: 22
  scan: true

time:
  - platform: ds1307
    id: ds_time
    address: 0x68
    timezone: "Europe/Warsaw"
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Warsaw"
    on_time_sync:
      then: [ds1307.write_time: { id: ds_time }]

output:
  - platform: ledc
    pin: 12
    id: out_lampa1
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 13
    id: out_lampa2
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 14
    id: out_lampa3
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 26
    id: out_lampa4
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 25
    id: out_lampa5
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 33
    id: out_lampa6
    inverted: true
    frequency: 1000Hz
  - platform: ledc
    pin: 32
    id: out_lampa7
    inverted: true
    frequency: 1000Hz
  - { platform: ledc, pin: 16, id: out_red, inverted: true }
  - { platform: ledc, pin: 17, id: out_green, inverted: true }
  - { platform: ledc, pin: 18, id: out_blue, inverted: true }

light:
