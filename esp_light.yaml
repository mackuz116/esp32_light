    type: float
    restore_value: yes
    initial_value: '1.0'



text_sensor:
  - platform: template
    name: "Czas z Internetu (NTP)"
    id: ntp_time_www
    icon: "mdi:clock-outline"
    update_interval: 1s
    lambda: |-
      return id(sntp_time).now().strftime("%Y-%m-%d %H:%M:%S");

  - platform: template
    name: "Czas z Modułu (RTC)"
    id: rtc_time_www
    icon: "mdi:chip"
    update_interval: 1s
    lambda: |-
      return id(ds_time).now().strftime("%Y-%m-%d %H:%M:%S");




