esphome:
  name: esp-light
  project:
    name: "mackuz.esp-light"
    version: "1.0"


# FIX DLA DS3231: Wymuszenie pracy na baterii  sd
  on_boot:
    priority: -100 
    then:
      - delay: 1s 
      - lambda: |-
          uint8_t status = 0;
          id(ds_time).read_byte(0x0F, &status);
          if (status >> 7) { ESP_LOGE("RTC_DIAG", "Wykryto zanik zasilania RTC!"); }
          
          id(ds_time).write_byte(0x0E, 0x00);
          id(ds_time).write_byte(0x0F, 0x00);
          ESP_LOGI("DS3231_FIX", "Wymuszono podtrzymanie bateryjne");
          id(ds_time).update();

esp32:
  board: esp32dev
  framework:
    type: arduino

preferences:
  flash_write_interval: 10s # Zapisuje zmiany do pamięci po 10 sekundach od ostatniej modyfikacji

logger:
  level: INFO
  # Wyciszenie logowania zmian wartości sensorów tekstowych
  logs:
    text_sensor: ERROR


api:
  encryption:
    key: !secret api_encryption_key
  password: !secret ota_password
  reboot_timeout: 15min # Jeśli HA nie odpowiada przez 15 min -> restart

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  reboot_timeout: 15min # Jeśli nie ma WiFi przez 15 min -> restart


# wifi:
#   use_address: 192.168.1.93  # <--- TUTAJ ma być ta opcja
#   networks:
#     - ssid: !secret wifi_ssid
#       password: !secret wifi_password
#       manual_ip:
#         static_ip: 192.168.1.93
#         gateway: 192.168.1.1
#         subnet: 255.255.255.0


# Dodaj te linie, aby aktywować stronę WWW
web_server:
  port: 80

# Opcjonalnie dodaj to, jeśli chcesz mieć ładniejszy interfejs (V3)
dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-webserver.yaml

i2c:
  sda: 21
  scl: 22
  scan: true


time:
  - platform: ds1307
    id: ds_time
    address: 0x68
    timezone: "Europe/Warsaw"
    update_interval: 15s

  - platform: sntp
    id: sntp_time
    timezone: "Europe/Warsaw"
    on_time_sync:
      then:
        - ds1307.write_time:
            id: ds_time






