esphome:
  name: esp-light
  project:
    name: "mackuz.esp-light"
    version: "1.2"
  on_boot:
    priority: 600
    then:
      # 1. Wyciszamy piny PWM na starcie, aby nie było błyśnięcia
      - light.turn_off: { id: lampa1, transition_length: 0s }
      - light.turn_off: { id: lampa2, transition_length: 0s }
      - light.turn_off: { id: lampa3, transition_length: 0s }
      - light.turn_off: { id: lampa4, transition_length: 0s }
      - light.turn_off: { id: lampa5, transition_length: 0s }
      - light.turn_off: { id: lampa6, transition_length: 0s }
      - light.turn_off: { id: lampa7, transition_length: 0s }      
      
      - delay: 5s 
      - lambda: |-
          // 2. Fix dla modułu RTC
          id(ds_time).write_byte(0x0E, 0x00);
          id(ds_time).write_byte(0x0F, 0x00);
          id(ds_time).update();
          ESP_LOGI("BOOT", "System gotowy. Startujemy łagodne rozpalanie.");

esp32:
  board: esp32dev
  framework: { type: arduino }

preferences:
  flash_write_interval: 1min

logger:
  level: INFO
  baud_rate: 0
  logs:
    text_sensor: ERROR

api:
  encryption: { key: !secret api_encryption_key }
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.1.93
  power_save_mode: NONE

web_server:
  port: 80

i2c:
  sda: 21
  scl: 22
  scan: true
  frequency: 400kHz

time:
  - platform: ds1307
    id: ds_time
    address: 0x68
    timezone: "Europe/Warsaw"
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Warsaw"
    on_time_sync:
      then: [ds1307.write_time: { id: ds_time }]

output:
  - { platform: ledc, pin: 12, id: out_lampa1, frequency: 1000Hz }
  - { platform: ledc, pin: 13, id: out_lampa2, frequency: 1000Hz }
  - { platform: ledc, pin: 14, id: out_lampa3, frequency: 1000Hz }
  - { platform: ledc, pin: 26, id: out_lampa4, frequency: 1000Hz }
  - { platform: ledc, pin: 25, id: out_lampa5, frequency: 1000Hz }
  - { platform: ledc, pin: 33, id: out_lampa6, frequency: 1000Hz }
  - { platform: ledc, pin: 32, id: out_lampa7, frequency: 1000Hz }
  - { platform: ledc, pin: 16, id: out_red }
  - { platform: ledc, pin: 17, id: out_green }
  - { platform: ledc, pin: 18, id: out_blue }

globals:
  - { id: g_pwr_l1, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l2, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l3, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l4, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l5, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l6, type: float, restore_value: yes, initial_value: '100.0' }
  - { id: g_pwr_l7, type: float, restore_value: yes, initial_value: '30.0' }
  
  # Czasy Główne
  - { id: g_h_start_sunrise, type: int, restore_value: yes, initial_value: '10' }
  - { id: g_m_start_sunrise, type: int, restore_value: yes, initial_value: '0' }
  - { id: g_h_end_sunrise, type: int, restore_value: yes, initial_value: '11' }
  - { id: g_m_end_sunrise, type: int, restore_value: yes, initial_value: '0' }
  - { id: g_h_start_sunset, type: int, restore_value: yes, initial_value: '18' }
  - { id: g_m_start_sunset, type: int, restore_value: yes, initial_value: '0' }
  - { id: g_h_end_sunset, type: int, restore_value: yes, initial_value: '19' }
  - { id: g_m_end_sunset, type: int, restore_value: yes, initial_value: '0' }

  # Lampa Tło
  - { id: g_l7_h_start_sunrise, type: int, restore_value: yes, initial_value: '9' }
  - { id: g_l7_m_start_sunrise, type: int, restore_value: yes, initial_value: '0' }
  - { id: g_l7_h_end_sunrise, type: int, restore_value: yes, initial_value: '11' }
  - { id: g_l7_m_end_sunrise, type: int, restore_value: yes, initial_value: '0' }
  - { id: g_l7_h_start_sunset, type: int, restore_value: yes, initial_value: '18' }
  - { id: g_l7_m_start_sunset, type: int, restore_value: yes, initial_value: '0' }
