interval:
  - interval: 1min
    then:
      - lambda: |-
          auto now = id(ds_time).now();
          if (!now.is_valid()) return;
          int cur = now.hour * 60 + now.minute;
          static bool is_first_run = true;

          // Funkcja obliczająca jasność 0.0 - 1.0
          auto calc = [&](int su, int eu, int sd, int ed) -> float {
            if (cur >= eu && cur < sd) return 1.0f; 
            if (cur >= su && cur < eu) return (float)(cur - su) / (float)(eu - su);
            if (cur >= sd && cur < ed) return 1.0f - (float)(cur - sd) / (float)(ed - sd);
            return 0.0f;
          };

          // 1. Obliczamy czasy BIAŁYCH (L1, L3, L4, L6)
          int s_u = id(g_h_start_sunrise) * 60 + id(g_m_start_sunrise);
          int e_u = id(g_h_end_sunrise) * 60 + id(g_m_end_sunrise);
          int s_d = id(g_h_start_sunset) * 60 + id(g_m_start_sunset);
          int e_d = id(g_h_end_sunset) * 60 + id(g_m_end_sunset);
          float br_white = calc(s_u, e_u, s_d, e_d);

          // 2. Obliczamy czasy GROW (L2, L5) - powiązane offsetem
          int gr_s_u = s_u - id(g_grow_offset_start); 
          int gr_e_u = e_u;
          int gr_s_d = s_d;
          int gr_e_d = e_d + id(g_grow_offset_end);
          float br_grow = calc(gr_s_u, gr_e_u, gr_s_d, gr_e_d);

          // Funkcja aplikująca z zabezpieczeniem termicznym
          auto apply = [&](light::LightState* l, float b, bool auto_m, float pwr_val) {
            if (auto_m) {
              float target = b * (pwr_val / 100.0f);
              
              // Ficzerek: Bezpiecznik termiczny (jeśli ESP na lampie > 72°C)
              if (id(esp_temp).state > 72.0) {
                target *= 0.8;
              }

              auto call = l->make_call();
              call.set_brightness(target);
              call.set_state(target > 0.005);
              call.set_transition_length(is_first_run ? 120000 : 55000);
              call.perform();
            }
          };

          // Aplikacja na kanały BIAŁE
          apply(id(lampa1), br_white, id(auto_l1).state, id(g_pwr_l1));
          apply(id(lampa3), br_white, id(auto_l3).state, id(g_pwr_l3));
          apply(id(lampa4), br_white, id(auto_l4).state, id(g_pwr_l4));
          apply(id(lampa6), br_white, id(auto_l6).state, id(g_pwr_l6));

          // Aplikacja na kanały GROW (L2 i L5)
          apply(id(lampa2), br_grow, id(auto_l2).state, id(g_pwr_l2));
          apply(id(lampa5), br_grow, id(auto_l5).state, id(g_pwr_l5));

          // Obliczenia i aplikacja dla L7 (Tło) - zsynchronizowane z białymi
          int l7_su = id(g_l7_h_start_sunrise) * 60 + id(g_l7_m_start_sunrise);
          int l7_eu = id(g_l7_h_end_sunrise) * 60 + id(g_l7_m_end_sunrise);
          int l7_sd = id(g_l7_h_start_sunset) * 60 + id(g_l7_m_start_sunset);
          int l7_ed = id(g_l7_h_end_sunset) * 60 + id(g_l7_m_end_sunset);
          apply(id(lampa7), calc(l7_su, l7_eu, l7_sd, l7_ed), id(auto_l7).state, id(g_pwr_l7));

