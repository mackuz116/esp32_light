  - platform: monochromatic
    name: "Lampa 1"
    output: out_lampa1
    id: lampa1
    on_state:
      then:
        - lambda: |-
            if (!id(auto_l1).state) {
              float v = id(lampa1).remote_values.get_brightness() * 100.0;
