    name: "Lampa 1"
    output: out_lampa1
    id: lampa1
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            float v = id(lampa1).remote_values.get_brightness() * 100.0;
            if (abs(id(pwr_l1).state - v) > 0.5) { auto c = id(pwr_l1).make_call(); c.set_value(v); c.perform(); }
