light:
  - platform: monochromatic
    name: "Lampa 1"
    output: out_lampa1
    id: lampa1
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
    on_state:
      then:
        - lambda: |-
            float v = id(lampa1).remote_values.get_brightness() * 100.0;
            // Jeśli różnica między paskiem a boxem jest większa niż 0.5%
            if (abs(id(pwr_l1).state - v) > 0.5) {
