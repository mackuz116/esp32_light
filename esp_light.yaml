interval:
  - interval: 1min
    then:
      - lambda: |-
          auto now = id(ds_time).now();
          if (!now.is_valid()) return;
          int cur = now.hour * 60 + now.minute;
          static bool is_first_run = true;

          // 1. LOGIKA CHMUR
          //float cloud_factor = 1.0f; 
          //if (id(chmury_on_off).state) {
          //  srand(cur); 
          //  if ((rand() % 100) < 15) { 
          //    cloud_factor = 0.60f;
          //  }
          //}

          // 1. LOGIKA CHMUR
          float cloud_factor = 1.0f; 
          if (id(chmury_on_off).state) {
            // Używamy micros() dla lepszej losowości niż cur
            srand(micros()); 
            int chance = rand() % 100;
            if (chance < 20) { // Zwiększyłem do 20% dla testu
              cloud_factor = 0.60f;
              // Ten log pojawi się od razu po wylosowaniu
              ESP_LOGW("akwarium", "LOSOWANIE: Chmura! (wylosowano: %d)", chance);
            } else {
              // Ten log potwierdzi Ci co minutę, że chmury są ON, ale akurat nie wylosowano
              ESP_LOGD("akwarium", "LOSOWANIE: Słońce (wylosowano: %d)", chance);
            }
          }


          // 2. FUNKCJA OBLICZAJĄCA POSTĘP (Ze strażnikiem)
          auto calc = [&](int su, int eu, int sd, int ed) -> float {
            if (cur < su) return 0.0f; 
            if (cur >= eu && cur < sd) return 1.0f; 
            if (cur >= su && cur < eu) return (float)(cur - su) / (float)(eu - su);
            if (cur >= sd && cur < ed) return 1.0f - (float)(cur - sd) / (float)(ed - sd);
            return 0.0f;
          };

          // 3. OBLICZENIA CZASÓW - USUNIĘTO .state
          int s_u = id(g_h_start_sunrise) * 60 + id(g_m_start_sunrise);
          int e_u = id(g_h_end_sunrise) * 60 + id(g_m_end_sunrise);
          int s_d = id(g_h_start_sunset) * 60 + id(g_m_start_sunset);
          int e_d = id(g_h_end_sunset) * 60 + id(g_m_end_sunset);

          float br_white = calc(s_u, e_u, s_d, e_d);
          
          // 4. GROW (L2, L5) - Wspólny koniec świtu i początek zachodu
          float br_grow = calc(s_u - id(g_grow_offset_start), 
                               e_u, 
                               s_d, 
                               e_d + id(g_grow_offset_end));

          // 5. TŁO (L7) - Własne godziny
          int l7_su = id(g_l7_h_start_sunrise) * 60 + id(g_l7_m_start_sunrise);
          int l7_eu = id(g_l7_h_end_sunrise) * 60 + id(g_l7_m_end_sunrise);
          int l7_sd = id(g_l7_h_start_sunset) * 60 + id(g_l7_m_start_sunset);
          int l7_ed = id(g_l7_h_end_sunset) * 60 + id(g_l7_m_end_sunset);

          float br_l7 = calc(l7_su, l7_eu, l7_sd, l7_ed);

          // 6. FUNKCJA APLIKUJĄCA
          auto apply = [&](light::LightState* l, float b, bool auto_m, float pwr_val, bool allow_clouds) {
            if (auto_m) {
              float multiplier = allow_clouds ? cloud_factor : 1.0f;
              float target = b * (pwr_val / 100.0f) * multiplier;

              // Sprawdzamy temperaturę
              bool temp_limit = false;
              if (id(esp_temp).state > 75.0) {
                target *= 0.8;
                temp_limit = true;
              }              
              
              // if (id(esp_temp).state > 72.0) target *= 0.8;

              float current = l->remote_values.get_brightness();
              if (abs(current - target) > 0.001f || is_first_run) {
                auto call = l->make_call();
                call.set_brightness(target);
                call.set_state(target > 0.0001f);
                call.set_transition_length(is_first_run ? 120000 : 59000);
                call.perform();
              }

              if (l == id(lampa1)) {
                if (temp_limit) {
                  ESP_LOGW("akwarium", "ALARM TEMP! Obniżono moc do 80%% z powodu temperatury: %.1f°C", id(esp_temp).state);
                }
                if (multiplier < 1.0f) {
                  ESP_LOGW("akwarium", "CHMURA: Redukcja do %.0f%%", multiplier * 100.0f);
                }
              }
            }
          };

          // 7. REALIZACJA - USUNIĘTO .state przy g_pwr
          apply(id(lampa1), br_white, id(auto_l1).state, id(g_pwr_l1), true);
          apply(id(lampa2), br_grow,  id(auto_l2).state, id(g_pwr_l2), true);
          apply(id(lampa3), br_white, id(auto_l3).state, id(g_pwr_l3), true);
          apply(id(lampa4), br_white, id(auto_l4).state, id(g_pwr_l4), true);
          apply(id(lampa5), br_grow,  id(auto_l5).state, id(g_pwr_l5), true);
          apply(id(lampa6), br_white, id(auto_l6).state, id(g_pwr_l6), true);
          apply(id(lampa7), br_l7,    id(auto_l7).state, id(g_pwr_l7), false);

          ESP_LOGI("akwarium", "Postep Bialych: %.2f, Postep Tla: %.2f, Grow: %.2f", br_white, br_l7, br_grow);

          is_first_run = false;