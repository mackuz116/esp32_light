interval:
  - interval: 1min
    then:
      - lambda: |-

          // --- LOGICZNY WATCHDOG (WDG) ---
          // 1. Sprawdzenie Temperatury (Wymaga sensora internal_temperature o id: esp_temp)
          if (id(esp_temp).state > 80.0) {
            ESP_LOGE("WDG", "KRYTYCZNA TEMPERATURA: %.1f°C! Restart systemu...", id(esp_temp).state);
            arch_restart();
          }

          // 2. Sprawdzenie Pamięci RAM (Zapobieganie zawieszeniu)
          if (esp_get_free_heap_size() < 20480) { // Jeśli spadnie poniżej 20KB
            ESP_LOGE("WDG", "MAŁO PAMIĘCI RAM! Restart prewencyjny...");
            arch_restart();
          }


          auto now = id(ds_time).now();
          int cur_min = now.hour * 60 + now.minute;

          // Pobranie czasów L1-6
          int m_up_s = (int)id(h_start_sunrise).state * 60 + (int)id(m_start_sunrise).state;
          int m_up_e = (int)id(h_end_sunrise).state * 60 + (int)id(m_end_sunrise).state;
          int m_dn_s = (int)id(h_start_sunset).state * 60 + (int)id(m_start_sunset).state;
          int m_dn_e = (int)id(h_end_sunset).state * 60 + (int)id(m_end_sunset).state;

          // Pobranie czasów L7
          int l7_up_s = (int)id(l7_h_start_sunrise).state * 60 + (int)id(l7_m_start_sunrise).state;
          int l7_up_e = (int)id(l7_h_end_sunrise).state * 60 + (int)id(l7_m_end_sunrise).state;
          int l7_dn_s = (int)id(l7_h_start_sunset).state * 60 + (int)id(l7_m_start_sunset).state;
          int l7_dn_e = (int)id(l7_h_end_sunset).state * 60 + (int)id(l7_m_end_sunset).state;

          // Funkcja pomocnicza do wykonania akcji
          auto run_light = [&](light::LightState* l, float target, float dur_min, bool auto_st) {
            if (auto_st) {
              auto call = l->make_call();
              call.set_brightness(target);
              call.set_transition_length(dur_min * 60000.0f);
              call.perform();
            }
          };

          // --- OBSŁUGA LAMP L1-L6 ---
          if (cur_min == m_up_s) {
            float d = max(1, m_up_e - m_up_s);
            run_light(id(lampa1), id(pwr_l1).state/100.0f, d, id(auto_l1).state);
            run_light(id(lampa2), id(pwr_l2).state/100.0f, d, id(auto_l2).state);
            run_light(id(lampa3), id(pwr_l3).state/100.0f, d, id(auto_l3).state);
            run_light(id(lampa4), id(pwr_l4).state/100.0f, d, id(auto_l4).state);
            run_light(id(lampa5), id(pwr_l5).state/100.0f, d, id(auto_l5).state);
            run_light(id(lampa6), id(pwr_l6).state/100.0f, d, id(auto_l6).state);
          }
          if (cur_min == m_dn_s) {
            float d = max(1, m_dn_e - m_dn_s);
            run_light(id(lampa1), 0.0, d, id(auto_l1).state);
            run_light(id(lampa2), 0.0, d, id(auto_l2).state);
            run_light(id(lampa3), 0.0, d, id(auto_l3).state);
            run_light(id(lampa4), 0.0, d, id(auto_l4).state);
            run_light(id(lampa5), 0.0, d, id(auto_l5).state);
            run_light(id(lampa6), 0.0, d, id(auto_l6).state);
          }

          // --- OBSŁUGA LAMPY L7 ---
          if (cur_min == l7_up_s) {
            run_light(id(lampa7), id(pwr_l7).state/100.0f, max(1, l7_up_e - l7_up_s), id(auto_l7).state);
          }
          if (cur_min == l7_dn_s) {
            run_light(id(lampa7), 0.0, max(1, l7_dn_e - l7_dn_s), id(auto_l7).state);
          }